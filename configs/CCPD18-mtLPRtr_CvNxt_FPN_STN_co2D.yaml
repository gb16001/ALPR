RESUME: true
NUM_EPOCHS: 100
DEVICE: cuda
AMP_DTYPE: bf16
GRADSCALER_ENABLE: false
DATASET:
  name: CCPD_base
  csvPath: datasets/CCPD2018/ccpd_base_A.csv
  preprocFun: img_Resize_jit_affine_norm_A
  batch_size: 16
  n_worker: 22
  drop_last: true
VAL_SET:
  name: CCPD_base
  csvPath: datasets/CCPD2018/ccpd_B+O_test_5%.csv
  preprocFun: resize_cv2_norm
  batch_size: 16
  n_worker: 22
  evaluator:
    name: LPs_evaluator_v2
MODEL:
  name: mtLPRtr_CvNxt_FPN_STN_co2D
  complile: true
  args:
    need_lpr: true
    need_stn: true
    need_mae: false
  finetune_mode: false
CRITERION:
  name: UniversalLossV2
OPTIM:
  name: AdamW
  backbone_lr: 0.0001
  lr: 0.0005
  betas:
  - 0.9
  - 0.999
  weight_decay: 0.01
LR_SCHEDULER:
  name: OneCycleRexLR
  max_lr:
  - 0.0001
  - 0.0005
  pct_start: 0.3
  div_factor: 25
  final_div_factor: 10000.0
LOGGER:
  log_dir: runs/CCPD18-mtLPRtr_CvNxt_FPN_STN_co2D
  need_history_ckpt: false
CHECKPOINT_DIR: runs/CCPD18-mtLPRtr_CvNxt_FPN_STN_co2D
CKPT_NAME: best.pth
